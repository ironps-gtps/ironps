<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Wallet</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.card{
width:350px;
background:#1e293b;
border-radius:20px;
padding:20px;
box-shadow:0 0 20px #00d4ff55;
}

h2{
text-align:center;
margin-bottom:20px;
color:#00d4ff;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:10px;
background:#00d4ff;
color:#000;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00b8e6;
}

#payment{
display:none;
text-align:center;
margin-top:20px;
}

img{
width:260px;
border-radius:15px;
margin:15px 0;
}

#timer{
font-size:22px;
color:#00ff99;
margin-top:10px;
}
</style>

</head>
<body>

<div class="card">

<h2>TOP UP WALLET</h2>

<div id="form">
<label>Masukkan Nominal</label>
<input type="number" id="nominal" placeholder="Contoh 10000">

<button onclick="bayar()">Bayar Sekarang</button>
</div>

<div id="payment">

<h3>Silakan Scan QRIS</h3>

<p id="harga"></p>

<img src="qris.jpeg">

<p>Status:</p>

<b style="color:orange;">Menunggu Pembayaran...</b>

<div id="timer">15:00</div>

</div>

</div>

<script>

function bayar(){

let n=document.getElementById("nominal").value;

if(n==""){
alert("Masukkan nominal!");
return;
}

document.getElementById("form").style.display="none";
document.getElementById("payment").style.display="block";

document.getElementById("harga").innerHTML="Total Bayar <b>Rp "+Number(n).toLocaleString("id-ID")+"</b>";

startTimer(900);

}

function startTimer(duration){

let timer=duration;

setInterval(function(){

let m=parseInt(timer/60);

let s=parseInt(timer%60);

m=m<10?"0"+m:m;
s=s<10?"0"+s:s;

document.getElementById("timer").innerHTML=m+":"+s;

if(timer>0) timer--;

},1000);

}

</script>

</body>
</html>
