<!DOCTYPE html>
<html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>YUNANI STORE</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#111827);color:#fff}
header{padding:24px;text-align:center;background:rgba(255,255,255,.05);backdrop-filter:blur(8px)}
.hero{padding:30px;text-align:center}
.wrap{max-width:430px;margin:20px auto;padding:16px}
.card{background:rgba(255,255,255,.06);border-radius:18px;padding:18px;box-shadow:0 0 20px rgba(0,255,255,.15)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button,.btn{padding:12px;border:0;border-radius:12px;background:#22d3ee;font-weight:bold;cursor:pointer;width:100%}
input{width:100%;padding:12px;border-radius:12px;border:0;margin:10px 0}
#pay{display:none;text-align:center}
img{width:100%;max-width:280px;background:#fff;padding:8px;border-radius:12px}
.review,.faq{background:rgba(255,255,255,.05);padding:14px;border-radius:12px;margin-top:12px}
.wa{position:fixed;right:18px;bottom:18px;background:#25D366;color:#fff;text-decoration:none;padding:14px 18px;border-radius:999px}
small{color:#cbd5e1}
</style></head><body>
<header><h1>YUNANI STORE</h1><small>Top Up Wallet Digital</small></header>
<div class="hero"><h2>⚡ Cepat • Aman • Mudah</h2></div>
<div class="wrap">
<div class="card">
<div id="form">
<div class="grid">
<button onclick="setNominal(10000)">10K</button><button onclick="setNominal(20000)">20K</button>
<button onclick="setNominal(50000)">50K</button><button onclick="setNominal(100000)">100K</button>
</div>
<input id="nominal" placeholder="Atau masukkan nominal">
<button onclick="bayar()">Bayar Sekarang</button>
</div>
<div id="pay">
<h3 id="total"></h3>
<img src="qr_ID1026543053759_03.07.26_1783069253_1783069253956.jpeg" alt="QRIS">
<p>Scan QRIS di atas</p><h2 id="timer">15:00</h2>
<button class="btn" onclick="copyNominal()">Salin Nominal</button>
</div>
</div>
<div class="review"><b>Ulasan Pelanggan</b><p>Tambahkan ulasan pelanggan asli di sini.</p></div>
<div class="faq"><b>FAQ</b><p>QRIS mendukung berbagai aplikasi yang kompatibel dengan standar QRIS.</p></div>
</div>
<a class="wa" href="https://wa.me/6288277321479">💬 Chat Admin</a>
<script>
let nominal=0;
function setNominal(n){nominal=n;document.getElementById('nominal').value=n;}
function bayar(){
 nominal=Number(document.getElementById('nominal').value);
 if(!nominal){alert('Masukkan nominal');return;}
 form.style.display='none';pay.style.display='block';
 total.innerText='Total: Rp '+nominal.toLocaleString('id-ID');
 let t=900;
 let x=setInterval(()=>{let m=Math.floor(t/60),s=t%60;timer.innerText=(m+'').padStart(2,'0')+':'+(s+'').padStart(2,'0');if(t--<=0)clearInterval(x);},1000);
}
function copyNominal(){navigator.clipboard.writeText(String(nominal));alert('Nominal disalin');}
</script></body></html>
